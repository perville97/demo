<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Résultats des étudiants</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', Arial, sans-serif;
}

body{
background: linear-gradient(145deg,#f8f0fc 0%,#e9d5ff 100%);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:15px;
}

.container{
max-width:1200px;
width:100%;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);
border-radius:20px;
box-shadow:0 10px 30px rgba(147,51,234,0.2);
padding:20px;
border:1px solid rgba(255,255,255,0.5);
}

h1{
color:#6b21a8;
font-size:2em;
margin-bottom:15px;
text-align:center;
font-weight:600;
}

h2{
color:#9333ea;
font-size:1.3em;
margin:20px 0 10px;
}

.stats{
background:rgba(255,255,255,0.7);
border-radius:12px;
padding:15px;
margin-bottom:20px;
box-shadow:0 4px 12px rgba(147,51,234,0.1);
}

.stat-item{
margin:8px 0;
font-size:1em;
color:#6b21a8;
}

.table-container{
background:rgba(255,255,255,0.5);
border-radius:12px;
padding:10px;
max-height:300px;
overflow-y:auto;
}

table{
width:100%;
border-collapse:collapse;
font-size:0.9em;
}

th{
background:linear-gradient(145deg,#a855f7,#9333ea);
color:white;
padding:10px;
position:sticky;
top:0;
}

td{
padding:8px;
border-bottom:1px solid #e9d5ff;
}

tr:hover td{
background:#f3e8ff;
}

.premier{
background:#fef3c7;
font-weight:bold;
}

.dernier{
background:#fee2e2;
}

.admis{
color:#16a34a;
font-weight:bold;
}

.ajourne{
color:#dc2626;
font-weight:bold;
}

.highlight-card{
background:rgba(255,255,255,0.7);
border-radius:12px;
padding:15px;
margin-top:10px;
box-shadow:0 4px 12px rgba(147,51,234,0.1);
}

.highlight-card table{
width:100%;
}

.back-link{
display:inline-block;
margin-top:20px;
color:#6b21a8;
text-decoration:none;
font-weight:500;
padding:8px 20px;
border-radius:30px;
background:rgba(255,255,255,0.6);
border:1px solid #c084fc;
}

.back-link:hover{
background:#c084fc;
color:white;
}

</style>
</head>

<body>

<div class="container">

<h1>Résultats des Étudiants</h1>

<div class="stats">

<div class="stat-item">
<strong>Moyenne de la classe :</strong>
<span th:text="${moyenneClasse}"></span>
</div>

<div class="stat-item">
<strong>Nombre d'admis (≥10) :</strong>
<span th:text="${nombreAdmis}"></span>
</div>

</div>

<h2>Classement général</h2>

<div class="table-container">

<table>

<thead>
<tr>
<th>Rang</th>
<th>Matricule</th>
<th>Nom</th>
<th>Prénom</th>
<th>Moyenne</th>
<th>Statut</th>
</tr>
</thead>

<tbody>

<tr th:each="resultat, iterStat : ${resultats}"
th:class="${iterStat.index == 0 ? 'premier' : (iterStat.index == resultats.size() - 1 ? 'dernier' : '')}">

<td th:text="${iterStat.index + 1}"></td>

<td th:text="${resultat.etudiant.matricule}"></td>

<td th:text="${resultat.etudiant.nom}"></td>

<td th:text="${resultat.etudiant.prenom}"></td>

<td th:text="${#numbers.formatDecimal(resultat.moyenne,1,2)}"></td>

<td>
<span th:if="${resultat.moyenne >= 10}" class="admis">ADMIS</span>
<span th:if="${resultat.moyenne < 10}" class="ajourne">AJOURNÉ</span>
</td>

</tr>

</tbody>

</table>

</div>


<h2>Premier de la classe</h2>

<div class="highlight-card" th:if="${premier != null}">

<table>
<tr>
<th>Matricule</th>
<td th:text="${premier.etudiant.matricule}"></td>
</tr>

<tr>
<th>Nom</th>
<td th:text="${premier.etudiant.nom + ' ' + premier.etudiant.prenom}"></td>
</tr>

<tr>
<th>Moyenne</th>
<td th:text="${#numbers.formatDecimal(premier.moyenne,1,2)}"></td>
</tr>
</table>

</div>


<h2>Dernier de la classe</h2>

<div class="highlight-card" th:if="${dernier != null}">

<table>
<tr>
<th>Matricule</th>
<td th:text="${dernier.etudiant.matricule}"></td>
</tr>

<tr>
<th>Nom</th>
<td th:text="${dernier.etudiant.nom + ' ' + dernier.etudiant.prenom}"></td>
</tr>

<tr>
<th>Moyenne</th>
<td th:text="${#numbers.formatDecimal(dernier.moyenne,1,2)}"></td>
</tr>
</table>

</div>

<a href="/" class="back-link">← Retour à l'accueil</a>

</div>

</body>
</html>
