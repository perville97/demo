<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Cours</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f8f0fc 0%, #e9d5ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(147, 51, 234, 0.2);
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        h1 {
            color: #6b21a8;
            font-size: 2em;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 600;
        }

        h2 {
            color: #9333ea;
            font-size: 1.3em;
            margin: 15px 0 10px;
            font-weight: 500;
        }

        .message {
            padding: 10px 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            font-size: 0.95em;
            text-align: center;
        }

        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .form-section {
            background: rgba(255, 255, 255, 0.7);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 12px rgba(147, 51, 234, 0.1);
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }

        .form-group {
            flex: 1 1 180px;
            min-width: 140px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #6b21a8;
            font-weight: 500;
            font-size: 0.9em;
        }

        input[type=text], input[type=number] {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #d8b4fe;
            border-radius: 8px;
            font-size: 0.9em;
            transition: all 0.2s ease;
            background: white;
        }

        input[type=text]:focus, input[type=number]:focus {
            border-color: #a855f7;
            outline: none;
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2);
        }

        button {
            background: linear-gradient(145deg, #a855f7, #9333ea);
            color: white;
            padding: 10px 25px;
            border: none;
            border-radius: 50px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(147, 51, 234, 0.3);
            height: 42px;
            white-space: nowrap;
            margin-top: 22px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(147, 51, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        /* SUPPRIME la hauteur fixe et le scroll */
        .table-container {
    background: rgba(255, 255, 255, 0.5);
    border-radius: 12px;
    padding: 10px;
}

        /* Optionnel : garder le style de la scrollbar mais sans la faire apparaître */
        .table-container::-webkit-scrollbar {
            width: 0px; /* Cachée */
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }

        th {
            background: linear-gradient(145deg, #a855f7, #9333ea);
            color: white;
            padding: 10px 8px;
            font-weight: 500;
            /* ENLEVER position: sticky pour que le tableau suive le flux */
            /* position: sticky; */
            /* top: 0; */
            /* z-index: 10; */
        }

        th:first-child {
            border-radius: 8px 0 0 8px;
        }

        th:last-child {
            border-radius: 0 8px 8px 0;
        }

        td {
            padding: 8px;
            border-bottom: 1px solid #e9d5ff;
        }

        tr:hover td {
            background-color: #f3e8ff;
        }

        td a {
            color: #dc2626;
            text-decoration: none;
            font-weight: 500;
            padding: 5px 12px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #fecaca;
            transition: all 0.2s ease;
            font-size: 0.85em;
            display: inline-block;
        }

        td a:hover {
            background: #fee2e2;
            color: #b91c1c;
            border-color: #f87171;
        }

        .back-link {
            display: inline-block;
            margin-top: 15px;
            color: #6b21a8;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95em;
            padding: 8px 20px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid #c084fc;
            transition: all 0.2s ease;
        }

        .back-link:hover {
            background: #c084fc;
            color: white;
        }

        .back-link::before {
            content: '←';
            margin-right: 5px;
            font-size: 1.1em;
        }

        @media (max-width: 900px) {
            .form-row {
                flex-direction: column;
                gap: 10px;
            }
            
            button {
                margin-top: 5px;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gestion des Cours</h1>
        
        <div th:if="${success}" class="message success" th:text="${success}"></div>
        <div th:if="${error}" class="message error" th:text="${error}"></div>
        
        <div class="form-section">
            <h2>Ajouter une matière</h2>
            <form action="/cours/save" method="post">
                <div class="form-row">
                    <div class="form-group">
                        <label>Code</label>
                        <input type="text" name="code" placeholder="" required>
                    </div>
                    <div class="form-group">
                        <label>Nom</label>
                        <input type="text" name="nom" placeholder="" required>
                    </div>
                    <div class="form-group">
                        <label>Coefficient</label>
                        <input type="number" step="0.5" name="coefficient" placeholder="" required>
                    </div>
                    <button type="submit">Ajouter</button>
                </div>
            </form>
        </div>
        
        <h2>Liste des matières</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Code</th>
                        <th>Nom</th>
                        <th>Coefficient</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="matiere : ${matieres}">
                        <td th:text="${matiere.id}"></td>
                        <td th:text="${matiere.code}"></td>
                        <td th:text="${matiere.nom}"></td>
                        <td th:text="${matiere.coefficient}"></td>
                        <td>
                            <a th:href="@{/cours/delete/{id}(id=${matiere.id})}" 
                               onclick="return confirm('Supprimer cette matière ?')">Supprimer</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <a href="/" class="back-link">Retour à l'accueil</a>
    </div>
</body>
</html>
